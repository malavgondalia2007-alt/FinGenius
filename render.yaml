services:
  # Backend Web Service
  - type: web
    name: fingenius-backend
    runtime: python
    rootDir: src/backend
    buildCommand: "./render-build.sh"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fingenius-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: fingenius-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: fingenius-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend Static Site
  - type: web
    name: fingenius-frontend
    runtime: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fingenius-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: fingenius-db
    plan: free

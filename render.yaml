# TRIGGER DEPLOY: 2026-03-14 21:20
services:
  # Backend Web Service
  - type: web
    name: fingenius-backend
    env: python
    plan: free
    rootDir: src/backend
    buildCommand: "bash render-build.sh"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: DATABASE_URL
        fromDatabase:
          name: fingenius-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        fromService:
          type: static_site
          name: fingenius-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        fromService:
          type: static_site
          name: fingenius-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # Frontend Static Site
  - type: static_site
    name: fingenius-frontend
    buildCommand: "npm install && npm run build"
    publishPath: "./dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fingenius-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: fingenius-db
    plan: free
